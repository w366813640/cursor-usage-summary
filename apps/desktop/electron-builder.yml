appId: com.cursorusage.desktop
productName: Cursor Usage
copyright: Copyright © ${author}
directories:
  output: release
  buildResources: build-resources

files:
  - dist/main/**/*
  - "package.json"
  # Bring in the production dependency tree (only @cu/storage +
  # better-sqlite3 + electron-updater + their transitives — esbuild
  # ships the rest inlined into dist/main/main.js).
  - "node_modules/**/*"
  - "!**/*.map"
  - "!**/{.DS_Store,.gitignore,.editorconfig}"
  - "!node_modules/**/{*.md,*.markdown,CHANGELOG*,LICENSE*,*.txt}"
  # pnpm's isolated linker symlinks packages to the workspace root,
  # so electron-builder can otherwise reach turbo caches and source
  # dirs of unrelated workspace packages. Block those explicitly.
  - "!**/.turbo/**"
  - "!**/{src,__tests__,scripts,tests}/**"
  - "!**/{tsconfig*.json,vitest.config.*,vite.config.*,biome.json,tailwind.config.*,postcss.config.*}"
  - "!**/{*.test.*,*.spec.*}"

extraResources:
  - from: ../playground/dist
    to: app/renderer
    filter: ["**/*"]

asar: true

# better-sqlite3 ships a `.node` binary (libdylib) per platform/arch.
# dlopen() can't load it from inside an asar archive, so we have to
# unpack the whole better-sqlite3 module tree at install time. The
# matching .node file ends up under
# `app.asar.unpacked/node_modules/better-sqlite3/build/Release/`.
asarUnpack:
  - "**/*.node"
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/bindings/**"
  - "**/node_modules/file-uri-to-path/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}
  # Add when a signed .ico is available — electron-builder picks a
  # default until then.
  # icon: build-resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Cursor Usage

# Disable auto-update publishing by default. Set CU_AUTO_UPDATE=1 +
# configure a publish provider (github / s3 / generic) to enable signed
# releases.
publish: null

mac:
  target:
    - dmg
  category: public.app-category.developer-tools

linux:
  target:
    - AppImage
  category: Utility
