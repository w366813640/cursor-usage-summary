appId: com.cursorusage.desktop
productName: Cursor Usage
copyright: Copyright © ${author}
directories:
  output: release
  buildResources: build-resources

files:
  - dist/main/**/*
  - "package.json"
  # Bring in the production dependency tree (only @cu/storage +
  # better-sqlite3 + electron-updater + their transitives — esbuild
  # ships the rest inlined into dist/main/main.js).
  - "node_modules/**/*"
  - "!**/*.map"
  - "!**/{.DS_Store,.gitignore,.editorconfig}"
  - "!node_modules/**/{*.md,*.markdown,CHANGELOG*,LICENSE*,*.txt}"
  # pnpm's isolated linker symlinks packages to the workspace root,
  # so electron-builder can otherwise reach turbo caches and source
  # dirs of unrelated workspace packages. Block those explicitly.
  - "!**/.turbo/**"
  - "!**/{src,__tests__,scripts,tests}/**"
  - "!**/{tsconfig*.json,vitest.config.*,vite.config.*,biome.json,tailwind.config.*,postcss.config.*}"
  - "!**/{*.test.*,*.spec.*}"

extraResources:
  - from: ../playground/dist
    to: app/renderer
    filter: ["**/*"]

asar: true

# better-sqlite3 ships a `.node` binary (libdylib) per platform/arch.
# dlopen() can't load it from inside an asar archive, so we have to
# unpack the whole better-sqlite3 module tree at install time. The
# matching .node file ends up under
# `app.asar.unpacked/node_modules/better-sqlite3/build/Release/`.
asarUnpack:
  - "**/*.node"
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/bindings/**"
  - "**/node_modules/file-uri-to-path/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}-${arch}.${ext}
  # Add when a signed .ico is available — electron-builder picks a
  # default until then.
  # icon: build-resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Cursor Usage

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  artifactName: ${productName}-${version}-${arch}.${ext}
  # macOS gatekeeper rejects unsigned binaries on first launch; ship
  # `hardenedRuntime: true` + a Developer ID when you have one.
  # hardenedRuntime: true
  # gatekeeperAssess: false
  # entitlements: build-resources/entitlements.mac.plist

dmg:
  artifactName: ${productName}-${version}-${arch}.dmg
  # Two-column layout: app icon on the left, /Applications shortcut on
  # the right — the conventional "drag to install" pattern.
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
  artifactName: ${productName}-${version}-${arch}.${ext}
  # Linux .desktop entry. AppImage extracts and registers this on first
  # run via the integration prompt.
  desktop:
    Name: Cursor Usage
    Comment: Desktop dashboard for your Cursor IDE usage history
    Categories: Utility;Development

# ─── Auto-update publish channel ──────────────────────────────────────
# Disabled by default — auto-update only runs when:
#
#   1. The app is `app.isPackaged` (so dev sessions never auto-check), AND
#   2. `CU_AUTO_UPDATE=1` is set in the user's environment, AND
#   3. `publish` below is configured with a real provider.
#
# To turn it on, replace `publish: null` with one of:
#
#   publish:
#     provider: github
#     owner: <your-gh-user-or-org>
#     repo: cursor-usage-viz
#     # GH_TOKEN must be exported when running `pnpm desktop:package`.
#
#   publish:
#     provider: generic
#     url: https://updates.example.com/cursor-usage/${channel}
#     channel: latest
#     # The build emits latest.yml / latest-mac.yml / latest-linux.yml
#     # alongside the installer; host them at `url` and the autoUpdater
#     # in `src/updater.ts` will pull them on launch.
#
# At runtime, `CU_UPDATE_FEED_URL` overrides whatever's baked in here,
# so a CI build can produce an installer that points at a per-environment
# update server without rebuilding.
publish: null
